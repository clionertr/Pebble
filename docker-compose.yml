version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    container_name: pebble-backend
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - pebble-net

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    container_name: pebble-frontend
    ports:
      # Only expose to local loopback. The public reverse proxy will route to this port.
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pebble-net

networks:
  pebble-net:
    driver: bridge
