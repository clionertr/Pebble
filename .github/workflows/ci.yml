name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Webmail Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a5bf18cdb2 # v4.1.0
        with:
          version: 11.1.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.x
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@9a30c0b558b4a85a37d0c1a1d38b15e8a8c8d3e7 # v2.7.8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend linter (ESLint)
        # 基线仍存在历史告警；在全部修完前先用 continue-on-error 保证 CI 可见但不阻塞。
        # 本地严格检查：`pnpm lint`（--max-warnings 0）。
        continue-on-error: true
        run: pnpm lint

      - name: Check frontend formatting (Prettier)
        # 同 lint：历史格式问题正在收敛，CI 仅汇报。
        continue-on-error: true
        run: pnpm format:check

      - name: Run frontend dependency audit
        continue-on-error: true
        run: pnpm audit --audit-level moderate

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check Rust lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check Rust dependency licenses and advisories
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2.2.0
        with:
          command: check

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build:frontend
