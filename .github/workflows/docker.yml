name: Docker Images

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: clionertr

jobs:
  build:
    name: Build ${{ matrix.arch }} images
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          semver_re='^v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?)$'
          if [[ ! "$GITHUB_REF_NAME" =~ $semver_re ]]; then
            echo "Docker image tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease, got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          version="${BASH_REMATCH[1]}"
          package_version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")"
          cargo_version="$(node <<'NODE'
          const fs = require('node:fs');
          const manifest = fs.readFileSync('server/Cargo.toml', 'utf8');
          const match = manifest.match(/^\s*version\s*=\s*"([^"]+)"/m);
          if (!match) {
            console.error('server/Cargo.toml does not contain a package version.');
            process.exit(1);
          }
          console.log(match[1]);
          NODE
          )"

          if [[ "$package_version" != "$version" ]]; then
            echo "package.json version '$package_version' does not match tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$version" ]]; then
            echo "server/Cargo.toml version '$cargo_version' does not match tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          prerelease=false
          major_minor="${version%.*}"
          if [[ "$version" == *-* ]]; then
            prerelease=true
            major_minor=""
          fi
          short_sha="${GITHUB_SHA::7}"

          {
            echo "version=${version}"
            echo "major_minor=${major_minor}"
            echo "short_sha=${short_sha}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: image_tags
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.vars.outputs.version }}
          MAJOR_MINOR: ${{ steps.vars.outputs.major_minor }}
          PRERELEASE: ${{ steps.vars.outputs.prerelease }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
        run: |
          set -euo pipefail
          backend="${REGISTRY}/${IMAGE_OWNER}/pebble"
          frontend="${REGISTRY}/${IMAGE_OWNER}/pebble-frontend"

          {
            echo "backend<<EOF"
            echo "${backend}:${VERSION}-${ARCH}"
            echo "${backend}:latest-${ARCH}"
            echo "${backend}:sha-${SHORT_SHA}-${ARCH}"
            if [[ "$PRERELEASE" == "false" ]]; then
              echo "${backend}:${MAJOR_MINOR}-${ARCH}"
            fi
            echo "EOF"

            echo "frontend<<EOF"
            echo "${frontend}:${VERSION}-${ARCH}"
            echo "${frontend}:latest-${ARCH}"
            echo "${frontend}:sha-${SHORT_SHA}-${ARCH}"
            if [[ "$PRERELEASE" == "false" ]]; then
              echo "${frontend}:${MAJOR_MINOR}-${ARCH}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.0.0
        with:
          context: .
          file: deploy/backend.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.image_tags.outputs.backend }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_OWNER }}/Pebble
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=pebble-backend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pebble-backend-${{ matrix.arch }}

      - name: Build and push frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.0.0
        with:
          context: .
          file: deploy/frontend.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.image_tags.outputs.frontend }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_OWNER }}/Pebble
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=pebble-frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pebble-frontend-${{ matrix.arch }}

  manifest:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Compute manifest tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          semver_re='^v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?)$'
          if [[ ! "$GITHUB_REF_NAME" =~ $semver_re ]]; then
            echo "Docker image tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease, got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          version="${BASH_REMATCH[1]}"
          prerelease=false
          major_minor="${version%.*}"
          if [[ "$version" == *-* ]]; then
            prerelease=true
            major_minor=""
          fi
          short_sha="${GITHUB_SHA::7}"

          {
            echo "version=${version}"
            echo "major_minor=${major_minor}"
            echo "short_sha=${short_sha}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish backend manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_OWNER}/pebble"
          tags=(
            -t "${image}:${{ steps.vars.outputs.version }}"
            -t "${image}:latest"
            -t "${image}:sha-${{ steps.vars.outputs.short_sha }}"
          )
          if [[ "${{ steps.vars.outputs.prerelease }}" == "false" ]]; then
            tags+=(
              -t "${image}:${{ steps.vars.outputs.major_minor }}"
            )
          fi

          docker buildx imagetools create "${tags[@]}" \
            "${image}:${{ steps.vars.outputs.version }}-amd64" \
            "${image}:${{ steps.vars.outputs.version }}-arm64"

      - name: Publish frontend manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_OWNER}/pebble-frontend"
          tags=(
            -t "${image}:${{ steps.vars.outputs.version }}"
            -t "${image}:latest"
            -t "${image}:sha-${{ steps.vars.outputs.short_sha }}"
          )
          if [[ "${{ steps.vars.outputs.prerelease }}" == "false" ]]; then
            tags+=(
              -t "${image}:${{ steps.vars.outputs.major_minor }}"
            )
          fi

          docker buildx imagetools create "${tags[@]}" \
            "${image}:${{ steps.vars.outputs.version }}-amd64" \
            "${image}:${{ steps.vars.outputs.version }}-arm64"
