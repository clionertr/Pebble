name: Docker Images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: clionertr

jobs:
  build:
    name: Build ${{ matrix.arch }} images
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Docker image tags must use vMAJOR.MINOR.PATCH, got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          version="${BASH_REMATCH[1]}"
          package_version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version)")"
          cargo_version="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' server/Cargo.toml | head -n 1)"

          if [[ "$package_version" != "$version" ]]; then
            echo "package.json version '$package_version' does not match tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$version" ]]; then
            echo "server/Cargo.toml version '$cargo_version' does not match tag '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          major_minor="${version%.*}"
          short_sha="${GITHUB_SHA::7}"

          {
            echo "version=${version}"
            echo "major_minor=${major_minor}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backend.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble:${{ steps.vars.outputs.version }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble:${{ steps.vars.outputs.major_minor }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble:latest-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble:sha-${{ steps.vars.outputs.short_sha }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_OWNER }}/Pebble
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=pebble-backend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pebble-backend-${{ matrix.arch }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/frontend.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble-frontend:${{ steps.vars.outputs.version }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble-frontend:${{ steps.vars.outputs.major_minor }}-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble-frontend:latest-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pebble-frontend:sha-${{ steps.vars.outputs.short_sha }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ env.IMAGE_OWNER }}/Pebble
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=pebble-frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pebble-frontend-${{ matrix.arch }}

  manifest:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Compute manifest tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          major_minor="${version%.*}"
          short_sha="${GITHUB_SHA::7}"

          {
            echo "version=${version}"
            echo "major_minor=${major_minor}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish backend manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_OWNER}/pebble"
          docker buildx imagetools create \
            -t "${image}:${{ steps.vars.outputs.version }}" \
            -t "${image}:${{ steps.vars.outputs.major_minor }}" \
            -t "${image}:latest" \
            -t "${image}:sha-${{ steps.vars.outputs.short_sha }}" \
            "${image}:${{ steps.vars.outputs.version }}-amd64" \
            "${image}:${{ steps.vars.outputs.version }}-arm64"

      - name: Publish frontend manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_OWNER}/pebble-frontend"
          docker buildx imagetools create \
            -t "${image}:${{ steps.vars.outputs.version }}" \
            -t "${image}:${{ steps.vars.outputs.major_minor }}" \
            -t "${image}:latest" \
            -t "${image}:sha-${{ steps.vars.outputs.short_sha }}" \
            "${image}:${{ steps.vars.outputs.version }}-amd64" \
            "${image}:${{ steps.vars.outputs.version }}-arm64"
