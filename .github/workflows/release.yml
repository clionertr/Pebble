name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pebble-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: pebble-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: pebble-macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pebble-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p pebble --target ${{ matrix.target }}

      - name: Package
        run: |
          cp "target/${{ matrix.target }}/release/pebble" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pebble-*
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/pebble-*
          generate_release_notes: true
          make_latest: true
