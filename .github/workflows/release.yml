name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pebble-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: pebble-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: pebble-macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pebble-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@9a30c0b558b4a85a37d0c1a1d38b15e8a8c8d3e7 # v2.7.8

      - name: Build
        run: cargo build --release -p pebble --target ${{ matrix.target }}

      - name: Package
        run: |
          cp "target/${{ matrix.target }}/release/pebble" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: pebble-*
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.3.3
        with:
          files: artifacts/pebble-*
          generate_release_notes: true
          make_latest: true
