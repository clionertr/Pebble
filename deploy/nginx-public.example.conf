server {
    listen 443 ssl;
    server_name mail.yourdomain.com;

    # SSL Certificates (e.g., Let's Encrypt managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/mail.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.yourdomain.com/privkey.pem;

    # ========================================================
    # Security: IP Whitelisting (defense-in-depth)
    # ========================================================
    allow 10.0.0.0/8;       # Allow VPN / Tailscale / WireGuard virtual IP range
    allow 192.168.1.0/24;   # Allow local network
    allow 127.0.0.1;        # Allow localhost
    deny all;               # Deny all other public internet traffic

    # ========================================================
    # Security Headers
    # ========================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    # Note: HSTS intentionally not set — self-hosted setups may not have HTTPS.

    # ========================================================
    # Reverse Proxy to Docker Compose Frontend Container
    # ========================================================
    location / {
        # The one-command Docker installer exposes Pebble on localhost:9191.
        proxy_pass http://127.0.0.1:9191;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets and SSE Connection settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Important for Server-Sent Events (SSE)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
