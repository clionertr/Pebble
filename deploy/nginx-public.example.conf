server {
    listen 443 ssl;
    server_name mail.yourdomain.com;

    # SSL Certificates (e.g., Let's Encrypt managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/mail.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.yourdomain.com/privkey.pem;

    # ========================================================
    # Security: IP Whitelisting
    # ========================================================
    allow 10.0.0.0/8;       # Allow VPN / Tailscale / WireGuard virtual IP range
    allow 192.168.1.0/24;   # Allow local network
    allow 127.0.0.1;        # Allow localhost
    deny all;               # Deny all other public internet traffic

    # ========================================================
    # Reverse Proxy to Docker Compose Frontend Container
    # ========================================================
    location / {
        # The docker-compose frontend service is exposed on localhost:8080
        proxy_pass http://127.0.0.1:8080;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets and SSE Connection settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Important for Server-Sent Events (SSE)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
