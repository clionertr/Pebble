services:
  backend:
    image: pebble-backend:latest
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    environment:
      PEBBLE_HOST: 0.0.0.0
    restart: unless-stopped
    networks:
      - pebble-net

  frontend:
    image: pebble-frontend:latest
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pebble-net

networks:
  pebble-net:
    driver: bridge
