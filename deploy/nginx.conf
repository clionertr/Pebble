server {
    listen 80;
    server_name localhost;

    # --- 新增：信任外部代理，提取真实 IP ---
    set_real_ip_from 0.0.0.0/0;      # 信任所有内网/容器网关IP (如果你想严格点，可以写 127.0.0.1, 172.16.0.0/12 等)
    real_ip_header X-Forwarded-For;  # 从大楼前台留下的这个标记里读取真实IP
    real_ip_recursive on;            # 逐层剥离代理IP，直到找到真正的外网IP
    # --------------------------------------

    root /usr/share/nginx/html;
    index index.html;

    # Serve static SPA files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API, Server-Sent Events, and OAuth to backend
    location ~ ^/(rpc|events|auth) {
        proxy_pass http://backend:3000;
        
        proxy_set_header Host $host;
        
        # 此时的 $remote_addr 已经被上面的 real_ip 模块替换成了真实访客 IP！
        proxy_set_header X-Real-IP $remote_addr; 
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering and timeouts for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}